<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0F6E56"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Produktivitas"/>
<meta name="description" content="Aplikasi Produktivitas Diri — To-Do, Harian, Pomodoro, Kebiasaan, Catatan"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="icons/icon-192.png"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>Produktivitas Diri</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;--green-mid:#5DCAA5;
  --bg:#F7F8FA;--surface:#FFFFFF;--border:#E8EAF0;--border2:#D0D4DE;
  --text:#1A1D23;--text2:#6B7280;--text3:#9CA3AF;
  --red:#E24B4A;--amber:#EF9F27;--blue:#378ADD;
  --radius:14px;--radius-sm:10px;--radius-xs:7px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);--shadow-lg:0 4px 24px rgba(0,0,0,0.10);
  --nav-h:64px;--safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#0F1117;--surface:#1A1D24;--border:#2A2D38;--border2:#3A3D4A;
    --text:#F0F2F8;--text2:#9CA3AF;--text3:#6B7280;
    --green-light:#0A3D2A;--shadow:0 2px 12px rgba(0,0,0,0.3);
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text)}
input,textarea,button,select{font-family:inherit;font-size:16px}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100dvh;height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px 10px;flex-shrink:0;box-shadow:var(--shadow)}
.header-top{display:flex;align-items:center;justify-content:space-between}
.app-title{font-size:18px;font-weight:600;color:var(--text)}
.app-date{font-size:12px;color:var(--text2);margin-top:2px}
.day-pill{background:var(--green-light);color:var(--green-dark);font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 16px)}
.page{display:none;padding:16px}
.page.active{display:block}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,0.06)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;color:var(--text3);transition:color .2s;padding:4px 0}
.nav-item.active{color:var(--green)}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-label{font-size:10px;font-weight:500}

/* CARDS */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.card-header{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:600;color:var(--text)}
.card-body{padding:0 16px 16px}

/* PROGRESS */
.prog-wrap{margin-bottom:16px}
.prog-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:6px}
.prog-bar{height:6px;background:var(--border);border-radius:3px}
.prog-fill{height:6px;background:var(--green);border-radius:3px;transition:width .4s ease}

/* TASK ROWS */
.task-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.task-cb{width:22px;height:22px;border-radius:7px;border:2px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.task-cb.done{background:var(--green);border-color:var(--green)}
.task-cb.done::after{content:'✓';color:#fff;font-size:13px;font-weight:700}
.task-text{flex:1;font-size:14px;line-height:1.4;cursor:pointer;transition:color .15s}
.task-text.done{text-decoration:line-through;color:var(--text3)}
.task-time-badge{font-size:11px;color:var(--text3);background:var(--bg);border:1px solid var(--border);padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.task-alarm{font-size:11px;padding:2px 7px;border-radius:20px;border:none;cursor:pointer;flex-shrink:0}
.task-alarm.on{background:var(--green-light);color:var(--green-dark)}
.task-alarm.off{background:var(--bg);color:var(--text3);border:1px solid var(--border)}
.del-btn{background:none;border:none;color:var(--text3);cursor:pointer;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.del-btn:active{background:var(--border);color:var(--red)}

/* ADD FORM */
.add-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border)}
.add-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;color:var(--text);outline:none}
.add-row input:focus{border-color:var(--green)}
.add-row .time-in{width:110px;flex:none}
.add-btn{background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);padding:10px 14px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.add-btn:active{background:var(--green-dark)}
.add-btn-full{width:100%;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);padding:13px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px}
.add-btn-full:active{background:var(--green-dark)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center}
.stat-num{font-size:24px;font-weight:600;color:var(--text)}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px}

/* POMODORO */
.pomo-circle{display:flex;flex-direction:column;align-items:center;padding:28px 16px 20px}
.pomo-mode{font-size:13px;color:var(--text2);font-weight:500;margin-bottom:12px;letter-spacing:0.5px;text-transform:uppercase}
.pomo-time-display{font-size:64px;font-weight:600;color:var(--text);letter-spacing:2px;font-variant-numeric:tabular-nums;line-height:1}
.pomo-sess-count{font-size:13px;color:var(--text2);margin-top:10px}
.pomo-btns{display:flex;gap:10px;padding:0 16px 16px}
.pomo-btn{flex:1;padding:14px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
.pomo-btn.primary{background:var(--green);color:#fff}
.pomo-btn.primary:active{background:var(--green-dark)}
.pomo-btn.secondary{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.pomo-btn.secondary:active{background:var(--border)}
.pomo-settings{padding:14px 16px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:12px}
.setting-item label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px}
.setting-item input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-xs);padding:9px 10px;color:var(--text);outline:none}
.setting-item input:focus{border-color:var(--green)}

/* HABITS */
.habit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.habit-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:all .2s;min-height:90px;justify-content:center}
.habit-card.done{background:var(--green-light);border-color:var(--green-mid)}
.habit-emoji{font-size:28px;line-height:1}
.habit-name{font-size:13px;font-weight:500;color:var(--text);text-align:center}
.habit-card.done .habit-name{color:var(--green-dark)}
.habit-check{font-size:16px;color:var(--green);opacity:0;transition:opacity .2s}
.habit-card.done .habit-check{opacity:1}
.habit-sub{font-size:13px;color:var(--text2);margin-bottom:14px;text-align:center}

/* NOTE */
.note-area{width:100%;min-height:160px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-size:14px;color:var(--text);resize:none;outline:none;line-height:1.7}
.note-area:focus{border-color:var(--green)}
.note-saved-msg{font-size:12px;color:var(--green);text-align:center;margin-top:6px;height:16px;opacity:0;transition:opacity .3s}

/* ALARM BANNER */
.alarm-banner{position:fixed;top:0;left:0;right:0;z-index:999;background:var(--green);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;transform:translateY(-100%);transition:transform .3s;box-shadow:var(--shadow-lg)}
.alarm-banner.show{transform:translateY(0)}
.alarm-banner-text{flex:1;font-size:14px;font-weight:500}
.alarm-close{background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;font-weight:500}

/* SECTION LABEL */
.sec-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:8px;margin-top:4px}

/* EMPTY STATE */
.empty{text-align:center;padding:32px 16px;color:var(--text3);font-size:14px}

/* SCROLLBAR */
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<div class="alarm-banner" id="alarm-banner">
  <span style="font-size:20px">⏰</span>
  <span class="alarm-banner-text" id="alarm-text">Waktunya: Sarapan pagi</span>
  <button class="alarm-close" onclick="dismissAlarm()">Tutup</button>
</div>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="app-title">Produktivitas Diri</div>
        <div class="app-date" id="hdr-date"></div>
      </div>
      <div class="day-pill" id="hdr-day-pill"></div>
    </div>
  </div>

  <div class="content" id="content">

    <!-- PAGE: HARIAN -->
    <div class="page active" id="page-harian">
      <div class="prog-wrap">
        <div class="prog-row">
          <span id="prog-text">0 dari 0 selesai</span>
          <span id="prog-pct" style="font-weight:600;color:var(--green)">0%</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
      <div class="card">
        <div id="task-list"></div>
        <div class="add-row">
          <input type="text" id="new-task" placeholder="Tambah kegiatan..." />
          <input type="time" id="new-time" class="time-in"/>
          <button class="add-btn" onclick="addTask()">+</button>
        </div>
      </div>
    </div>

    <!-- PAGE: TODO -->
    <div class="page" id="page-todo">
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-num" id="s-total">0</div><div class="stat-lbl">Total</div></div>
        <div class="stat-box"><div class="stat-num" id="s-done" style="color:var(--green)">0</div><div class="stat-lbl">Selesai</div></div>
        <div class="stat-box"><div class="stat-num" id="s-left" style="color:var(--amber)">0</div><div class="stat-lbl">Tersisa</div></div>
      </div>
      <div class="card">
        <div id="todo-list"></div>
        <div class="add-row">
          <input type="text" id="todo-in" placeholder="Tambah tugas baru..." onkeydown="if(event.key==='Enter')addTodo()"/>
          <button class="add-btn" onclick="addTodo()">+</button>
        </div>
      </div>
    </div>

    <!-- PAGE: POMO -->
    <div class="page" id="page-pomo">
      <div class="card">
        <div class="pomo-circle">
          <div class="pomo-mode" id="pomo-mode-lbl">SESI FOKUS</div>
          <div class="pomo-time-display" id="pomo-time">25:00</div>
          <div class="pomo-sess-count" id="pomo-sess">Sesi selesai hari ini: 0</div>
        </div>
        <div class="pomo-btns">
          <button class="pomo-btn primary" onclick="togglePomo()" id="pomo-btn">Mulai</button>
          <button class="pomo-btn secondary" onclick="resetPomo()">Reset</button>
        </div>
        <div class="pomo-settings">
          <div class="setting-item">
            <label>Fokus (menit)</label>
            <input type="number" id="focus-min" value="25" min="1" max="60" onchange="resetPomo()"/>
          </div>
          <div class="setting-item">
            <label>Istirahat (menit)</label>
            <input type="number" id="break-min" value="5" min="1" max="30" onchange="resetPomo()"/>
          </div>
        </div>
      </div>
    </div>

    <!-- PAGE: KEBIASAAN -->
    <div class="page" id="page-kebiasaan">
      <div class="habit-sub" id="habit-sub">0 dari 0 kebiasaan selesai hari ini</div>
      <div class="habit-grid" id="habit-grid"></div>
      <div class="card">
        <div class="card-header"><span class="card-title">Tambah Kebiasaan</span></div>
        <div class="card-body">
          <input type="text" id="habit-in" placeholder="Nama kebiasaan..." style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 12px;color:var(--text);outline:none;margin-bottom:8px" />
          <input type="text" id="habit-emoji-in" placeholder="Emoji (contoh: 🏃)" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 12px;color:var(--text);outline:none;margin-bottom:8px" />
          <button class="add-btn-full" onclick="addHabit()">+ Tambah Kebiasaan</button>
        </div>
      </div>
    </div>

    <!-- PAGE: CATATAN -->
    <div class="page" id="page-catatan">
      <div class="sec-label" id="note-date-lbl"></div>
      <div class="card">
        <div class="card-body" style="padding-top:14px">
          <textarea class="note-area" id="note-area" placeholder="Tulis catatan hari ini..."></textarea>
          <button class="add-btn-full" onclick="saveNote()" style="margin-top:10px">Simpan Catatan</button>
          <div class="note-saved-msg" id="note-saved">✓ Catatan tersimpan</div>
        </div>
      </div>
    </div>

  </div><!-- /content -->

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" onclick="showPage('harian',0)" id="nav0">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
      <span class="nav-label">Harian</span>
    </button>
    <button class="nav-item" onclick="showPage('todo',1)" id="nav1">
      <svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span class="nav-label">To-Do</span>
    </button>
    <button class="nav-item" onclick="showPage('pomo',2)" id="nav2">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 15"/></svg>
      <span class="nav-label">Pomodoro</span>
    </button>
    <button class="nav-item" onclick="showPage('kebiasaan',3)" id="nav3">
      <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span class="nav-label">Kebiasaan</span>
    </button>
    <button class="nav-item" onclick="showPage('catatan',4)" id="nav4">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>
      <span class="nav-label">Catatan</span>
    </button>
  </nav>
</div>

<script>
const DAYS=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const MONTHS=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const DAYKEYS=['minggu','senin','selasa','rabu','kamis','jumat','sabtu'];

const now=new Date();
const dayIdx=now.getDay();
const dayKey=DAYKEYS[dayIdx];
const todayISO=now.toISOString().split('T')[0];
const dateStr=`${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;

document.getElementById('hdr-date').textContent=`${DAYS[dayIdx]}, ${dateStr}`;
document.getElementById('hdr-day-pill').textContent=dayIdx===0||dayIdx===6?'Akhir Pekan':'Hari Kerja';
document.getElementById('note-date-lbl').textContent=`Catatan — ${dateStr}`;

const DEFAULT_TASKS={
  senin:[{t:'Sarapan pagi',w:'06:30'},{t:'Olahraga ringan',w:'07:00'},{t:'Belajar / bekerja',w:'08:00'},{t:'Makan siang',w:'12:00'},{t:'Istirahat sore',w:'15:00'},{t:'Membaca buku',w:'20:00'}],
  selasa:[{t:'Sarapan pagi',w:'06:30'},{t:'Olahraga ringan',w:'07:00'},{t:'Belajar / bekerja',w:'08:00'},{t:'Makan siang',w:'12:00'},{t:'Review catatan kemarin',w:'15:00'},{t:'Journaling',w:'21:00'}],
  rabu:[{t:'Sarapan pagi',w:'06:30'},{t:'Olahraga',w:'07:00'},{t:'Belajar / bekerja',w:'08:00'},{t:'Makan siang',w:'12:00'},{t:'Rapat / diskusi',w:'14:00'},{t:'Baca buku',w:'20:00'}],
  kamis:[{t:'Sarapan pagi',w:'06:30'},{t:'Olahraga',w:'07:00'},{t:'Belajar / bekerja',w:'08:00'},{t:'Makan siang',w:'12:00'},{t:'Evaluasi minggu ini',w:'16:00'},{t:'Waktu santai',w:'19:00'}],
  jumat:[{t:'Sarapan pagi',w:'06:30'},{t:'Olahraga',w:'07:00'},{t:'Belajar / bekerja',w:'08:00'},{t:'Makan siang',w:'12:00'},{t:'Persiapan weekend',w:'16:00'},{t:'Ibadah / refleksi',w:'18:00'}],
  sabtu:[{t:'Sarapan santai',w:'08:00'},{t:'Olahraga / jalan pagi',w:'09:00'},{t:'Beres-beres',w:'10:00'},{t:'Waktu keluarga',w:'14:00'},{t:'Hobi & kreativitas',w:'16:00'},{t:'Film / hiburan',w:'20:00'}],
  minggu:[{t:'Sarapan santai',w:'08:30'},{t:'Ibadah',w:'09:00'},{t:'Waktu keluarga',w:'11:00'},{t:'Makan bersama',w:'12:30'},{t:'Istirahat siang',w:'14:00'},{t:'Persiapan minggu depan',w:'19:00'}]
};

function gs(k,d){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d}catch{return d}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

let tasks=gs('tasks_'+todayISO,(DEFAULT_TASKS[dayKey]||[]).map((x,i)=>({id:i,t:x.t,w:x.w,done:false,alarm:false})));
let todos=gs('todos',[]);
let habits=gs('habits',[{n:'Olahraga',e:'🏃'},{n:'Minum air putih',e:'💧'},{n:'Membaca',e:'📖'},{n:'Meditasi',e:'🧘'},{n:'Tidur cukup',e:'😴'},{n:'Bersyukur',e:'🙏'}]);
let habitDone=gs('habit_done_'+todayISO,[]);
let pomoSess=gs('pomo_sess_'+todayISO,0);
let noteVal=gs('note_'+todayISO,'');

let nextTaskId=tasks.length?Math.max(...tasks.map(x=>x.id))+1:0;
let nextTodoId=todos.length?Math.max(...todos.map(x=>x.id))+1:0;
let pomoRunning=false,pomoInterval=null,pomoSeconds=0,pomoMode='focus';
let alarmTimers=[];

// ===== ALARM SYSTEM =====
let notifPermission='default';
async function requestNotifPerm(){
  if(!('Notification' in window))return;
  if(Notification.permission==='granted'){notifPermission='granted';return;}
  if(Notification.permission!=='denied'){
    const p=await Notification.requestPermission();
    notifPermission=p;
  }
}
requestNotifPerm();

function scheduleAlarms(){
  alarmTimers.forEach(t=>clearTimeout(t));
  alarmTimers=[];
  tasks.filter(t=>t.alarm&&t.w&&!t.done).forEach(task=>{
    const[h,m]=task.w.split(':').map(Number);
    const alarmTime=new Date();
    alarmTime.setHours(h,m,0,0);
    const diff=alarmTime-new Date();
    if(diff>0){
      const tid=setTimeout(()=>fireAlarm(task),diff);
      alarmTimers.push(tid);
    }
  });
}

function fireAlarm(task){
  const msg=`Waktunya: ${task.t}`;
  if(notifPermission==='granted'){
    try{
      new Notification('⏰ Pengingat Kegiatan',{body:msg,icon:'icons/icon-192.png',badge:'icons/icon-72.png',vibrate:[200,100,200]});
    }catch(e){}
  }
  showAlarmBanner(msg);
}

function showAlarmBanner(msg){
  document.getElementById('alarm-text').textContent=msg;
  const b=document.getElementById('alarm-banner');
  b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),8000);
}

function dismissAlarm(){
  document.getElementById('alarm-banner').classList.remove('show');
}

// ===== TASKS =====
function renderTasks(){
  const el=document.getElementById('task-list');
  if(!tasks.length){el.innerHTML='<div class="empty">Belum ada kegiatan hari ini</div>';updateProg();return;}
  el.innerHTML=tasks.map(t=>`
    <div class="task-item">
      <div class="task-cb ${t.done?'done':''}" onclick="toggleTask(${t.id})"></div>
      <span class="task-text ${t.done?'done':''}" onclick="toggleTask(${t.id})">${t.t}</span>
      ${t.w?`<span class="task-time-badge">${t.w}</span>`:''}
      ${t.w?`<button class="task-alarm ${t.alarm?'on':'off'}" onclick="toggleAlarm(${t.id})" title="${t.alarm?'Alarm aktif':'Aktifkan alarm'}">${t.alarm?'🔔':'🔕'}</button>`:''}
      <button class="del-btn" onclick="delTask(${t.id})">×</button>
    </div>`).join('');
  updateProg();
}

function updateProg(){
  const done=tasks.filter(x=>x.done).length,total=tasks.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=`${done} dari ${total} selesai`;
  document.getElementById('prog-pct').textContent=pct+'%';
}

function toggleTask(id){
  tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);
  ss('tasks_'+todayISO,tasks);renderTasks();
}
function toggleAlarm(id){
  if(notifPermission==='default')requestNotifPerm().then(()=>_doToggleAlarm(id));
  else _doToggleAlarm(id);
}
function _doToggleAlarm(id){
  tasks=tasks.map(t=>t.id===id?{...t,alarm:!t.alarm}:t);
  ss('tasks_'+todayISO,tasks);renderTasks();scheduleAlarms();
}
function delTask(id){tasks=tasks.filter(t=>t.id!==id);ss('tasks_'+todayISO,tasks);renderTasks();scheduleAlarms();}
function addTask(){
  const v=document.getElementById('new-task').value.trim();
  const w=document.getElementById('new-time').value;
  if(!v)return;
  tasks.push({id:nextTaskId++,t:v,w:w,done:false,alarm:false});
  document.getElementById('new-task').value='';
  document.getElementById('new-time').value='';
  ss('tasks_'+todayISO,tasks);renderTasks();
}
document.getElementById('new-task').addEventListener('keydown',e=>{if(e.key==='Enter')addTask()});

// ===== TODOS =====
function renderTodos(){
  const el=document.getElementById('todo-list');
  if(!todos.length){el.innerHTML='<div class="empty">Belum ada tugas</div>';updateTodoStats();return;}
  el.innerHTML=todos.map(t=>`
    <div class="task-item">
      <div class="task-cb ${t.done?'done':''}" onclick="toggleTodo(${t.id})"></div>
      <span class="task-text ${t.done?'done':''}" onclick="toggleTodo(${t.id})">${t.t}</span>
      <button class="del-btn" onclick="delTodo(${t.id})">×</button>
    </div>`).join('');
  updateTodoStats();
}
function updateTodoStats(){
  const done=todos.filter(x=>x.done).length,total=todos.length;
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-left').textContent=total-done;
}
function addTodo(){
  const v=document.getElementById('todo-in').value.trim();
  if(!v)return;
  todos.push({id:nextTodoId++,t:v,done:false});
  document.getElementById('todo-in').value='';
  ss('todos',todos);renderTodos();
}
function toggleTodo(id){todos=todos.map(t=>t.id===id?{...t,done:!t.done}:t);ss('todos',todos);renderTodos();}
function delTodo(id){todos=todos.filter(t=>t.id!==id);ss('todos',todos);renderTodos();}

// ===== POMODORO =====
function getFocusSec(){return(parseInt(document.getElementById('focus-min').value)||25)*60}
function getBreakSec(){return(parseInt(document.getElementById('break-min').value)||5)*60}
function updatePomoDisplay(){
  const m=Math.floor(pomoSeconds/60),s=pomoSeconds%60;
  document.getElementById('pomo-time').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function resetPomo(){
  clearInterval(pomoInterval);pomoRunning=false;pomoMode='focus';
  pomoSeconds=getFocusSec();
  document.getElementById('pomo-btn').textContent='Mulai';
  document.getElementById('pomo-mode-lbl').textContent='SESI FOKUS';
  updatePomoDisplay();
}
function togglePomo(){
  if(pomoRunning){
    clearInterval(pomoInterval);pomoRunning=false;
    document.getElementById('pomo-btn').textContent='Lanjut';
  } else {
    if(pomoSeconds===0)resetPomo();
    pomoRunning=true;
    document.getElementById('pomo-btn').textContent='Jeda';
    pomoInterval=setInterval(()=>{
      pomoSeconds--;updatePomoDisplay();
      if(pomoSeconds<=0){
        clearInterval(pomoInterval);pomoRunning=false;
        if(pomoMode==='focus'){
          pomoSess++;ss('pomo_sess_'+todayISO,pomoSess);
          document.getElementById('pomo-sess').textContent='Sesi selesai hari ini: '+pomoSess;
          if(notifPermission==='granted')try{new Notification('☕ Waktu Istirahat!',{body:`Sesi fokus ke-${pomoSess} selesai. Waktunya istirahat!`,icon:'icons/icon-192.png'})}catch(e){}
          pomoMode='break';pomoSeconds=getBreakSec();
          document.getElementById('pomo-mode-lbl').textContent='WAKTU ISTIRAHAT ☕';
          document.getElementById('pomo-btn').textContent='Mulai Istirahat';
        } else {
          if(notifPermission==='granted')try{new Notification('💪 Ayo Fokus Lagi!',{body:'Istirahat selesai. Waktunya sesi fokus berikutnya!',icon:'icons/icon-192.png'})}catch(e){}
          pomoMode='focus';pomoSeconds=getFocusSec();
          document.getElementById('pomo-mode-lbl').textContent='SESI FOKUS';
          document.getElementById('pomo-btn').textContent='Mulai Fokus';
        }
        updatePomoDisplay();
      }
    },1000);
  }
}

// ===== HABITS =====
function renderHabits(){
  const el=document.getElementById('habit-grid');
  el.innerHTML=habits.map((h,i)=>`
    <div class="habit-card ${habitDone.includes(i)?'done':''}" onclick="toggleHabit(${i})">
      <span class="habit-emoji">${h.e}</span>
      <span class="habit-name">${h.n}</span>
      <span class="habit-check">✓</span>
    </div>`).join('');
  document.getElementById('habit-sub').textContent=`${habitDone.length} dari ${habits.length} kebiasaan selesai hari ini`;
}
function toggleHabit(i){
  habitDone=habitDone.includes(i)?habitDone.filter(x=>x!==i):[...habitDone,i];
  ss('habit_done_'+todayISO,habitDone);renderHabits();
}
function addHabit(){
  const n=document.getElementById('habit-in').value.trim();
  const e=document.getElementById('habit-emoji-in').value.trim()||'⭐';
  if(!n)return;
  habits.push({n,e});
  document.getElementById('habit-in').value='';
  document.getElementById('habit-emoji-in').value='';
  ss('habits',habits);renderHabits();
}

// ===== NOTE =====
function saveNote(){
  ss('note_'+todayISO,document.getElementById('note-area').value);
  const el=document.getElementById('note-saved');
  el.style.opacity=1;setTimeout(()=>el.style.opacity=0,2000);
}

// ===== NAV =====
const pages=['harian','todo','pomo','kebiasaan','catatan'];
function showPage(name,idx){
  pages.forEach(p=>document.getElementById('page-'+p).classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  for(let i=0;i<5;i++)document.getElementById('nav'+i).classList.toggle('active',i===idx);
  document.getElementById('content').scrollTop=0;
}

// INIT
pomoSeconds=getFocusSec();
document.getElementById('pomo-sess').textContent='Sesi selesai hari ini: '+pomoSess;
document.getElementById('note-area').value=noteVal;
updatePomoDisplay();
renderTasks();
renderTodos();
renderHabits();
scheduleAlarms();

      .catch(err=>console.log('SW error:',err));
  });
